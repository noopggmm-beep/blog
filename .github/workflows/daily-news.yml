name: 每日新闻自动生成

on:
  schedule:
    # 北京时间每天早上 8:00 (UTC 00:00)
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 运行新闻生成脚本
        run: node scripts/generate-daily-news.js

      - name: 提交并推送
        run: |
          git config user.name "Daily News Bot"
          git config user.email "bot@noopggmm.blog"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "📰 每日新闻更新 — $(date +'%Y-%m-%d')

            自动生成当日四大栏目新闻模板：
            - 国际十大新闻
            - 国内十大新闻
            - 科技创新十大突破
            - 知识产权十大事件

            [skip ci]"
            git push
            echo "✅ 已推送，Vercel 将自动部署"
          fi
